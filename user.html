<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শিট ম্যানেজার</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f8f9fa; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        input { padding: 12px; width: 85%; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 20px; outline: none; }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; transition: 0.3s; color: white; }
        .add-btn { background: #28a745; }
        .del-btn { background: #dc3545; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #ccc; }
        #status { margin-top: 20px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Add Or Remove User</h2>
    <input type="text" id="userName" placeholder="নাম লিখুন...">
    <div class="btn-group">
        <button id="addBtn" class="add-btn" onclick="processData('add')">Add</button>
        <button id="delBtn" class="del-btn" onclick="processData('delete')">Delete</button>
    </div>
    <div id="status">নাম লিখে অ্যাকশন সিলেক্ট করুন</div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbyszEAI6Saaz_b-sKu7zGoP1Y_P_8PJgy0hsFX2kF5s_gdxR_ejZbvIqX20Y5VM88fh/exec";

    function processData(actionType) {
        const nameInput = document.getElementById('userName');
        const status = document.getElementById('status');
        const name = nameInput.value.trim();

        if (!name) return alert("নাম লিখুন!");

        status.innerText = "কাজ চলছে...";
        status.style.color = "blue";
        toggleButtons(true);

        fetch(scriptURL, {
            method: "POST",
            body: JSON.stringify({ name: name, action: actionType }),
            headers: { "Content-Type": "text/plain;charset=utf-8" }
        })
        .then(res => res.json())
        .then(data => {
            status.innerText = data.message;
            status.style.color = actionType === 'add' ? "green" : "red";
            nameInput.value = "";
            toggleButtons(false);
        })
        .catch(err => {
            status.innerText = "User Added!";
            status.style.color = "orange";
            toggleButtons(false);
        });
    }

    function toggleButtons(state) {
        document.getElementById('addBtn').disabled = state;
        document.getElementById('delBtn').disabled = state;
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ইমতিয়াজ আহমেদ | অ্যাডমিন প্রোফাইল - Muladi Govt College</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (Free Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f0f4ff 0%, #e9edf5 100%);
            font-family: 'Inter', 'Noto Sans Bengali', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        /* main card container */
        .profile-card {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(0px);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 4px 12px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .profile-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 32px 55px -15px rgba(0, 0, 0, 0.3);
        }

        /* inner content */
        .profile-inner {
            padding: 2rem 2rem 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* circular avatar container - facebook style */
        .avatar-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
            cursor: pointer;
        }

        .avatar {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2), 0 0 0 3px #e2e8f0;
            transition: all 0.25s ease;
            background: #fff;
        }

        .avatar:hover {
            transform: scale(1.02);
            box-shadow: 0 18px 32px rgba(0, 0, 0, 0.25), 0 0 0 4px #3b82f6;
        }

        /* floating badge (admin) */
        .admin-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: #1877f2;
            color: white;
            border-radius: 40px;
            padding: 6px 10px;
            font-size: 0.7rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            border: 2px solid white;
            font-family: 'Inter', sans-serif;
        }

        .admin-badge i {
            font-size: 0.7rem;
        }

        /* name heading */
        .name {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e293b, #2c3e66);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-top: 0.2rem;
            letter-spacing: -0.3px;
            text-align: center;
        }

        .college-name {
            font-size: 1rem;
            font-weight: 500;
            color: #2c3e66;
            background: #eef2ff;
            padding: 0.3rem 1rem;
            border-radius: 60px;
            display: inline-block;
            margin: 0.75rem 0 0.5rem;
            text-align: center;
        }

        .dept {
            font-size: 0.95rem;
            color: #475569;
            background: #f1f5f9;
            padding: 0.25rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            display: inline-block;
        }

        /* animated info container */
        .info-container {
            margin-top: 1.8rem;
            width: 100%;
            background: #f8fafd;
            border-radius: 32px;
            padding: 1.3rem 1.8rem;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02), 0 4px 12px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(203, 213, 225, 0.4);
        }

        /* typing lines - each line appears one after another */
        .info-line {
            font-size: 1rem;
            line-height: 1.55;
            margin-bottom: 1rem;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-weight: 500;
            color: #1e293b;
            opacity: 0;
            transform: translateY(8px);
            animation: fadeSlideUp 0.4s forwards;
            border-left: 3px solid #1877f2;
            padding-left: 14px;
        }

        /* icon style */
        .info-line i {
            width: 24px;
            color: #1877f2;
            font-size: 1.2rem;
            margin-top: 2px;
        }

        .info-text {
            flex: 1;
            word-break: break-word;
        }

        /* typing effect for each text inside .info-text */
        .typewriter {
            display: inline-block;
            overflow: hidden;
            white-space: normal;
            border-right: 2px solid #1877f2;
            animation: blinkCursor 0.75s step-end infinite;
        }

        /* keyframes for fade + slide */
        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes blinkCursor {
            0%, 100% { border-color: transparent; }
            50% { border-color: #1877f2; }
        }

        /* facebook button */
        .facebook-btn {
            margin-top: 1.8rem;
            width: 100%;
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 0.9rem 0;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.25s;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 8px 16px -6px rgba(24, 119, 242, 0.3);
        }

        .facebook-btn i {
            font-size: 1.4rem;
        }

        .facebook-btn:hover {
            background: #0e62cf;
            transform: scale(0.98);
            box-shadow: 0 4px 10px rgba(24, 119, 242, 0.4);
        }

        /* small additional text */
        .footer-note {
            margin-top: 1.4rem;
            font-size: 0.7rem;
            color: #5b6e8c;
            text-align: center;
            font-weight: 400;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .profile-inner {
                padding: 1.5rem;
            }
            .avatar {
                width: 140px;
                height: 140px;
            }
            .name {
                font-size: 1.6rem;
            }
            .info-container {
                padding: 1rem 1.2rem;
            }
            .info-line {
                font-size: 0.9rem;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="profile-inner">
        <!-- ছবির অংশ: গোলাকার, ফেসবুক প্রোফাইল পিকচারের মতো -->
        <div class="avatar-wrapper">
            <img src="aimtiaj.jpg" alt="Imtiaj Ahmed - Admin" class="avatar" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?background=1877f2&color=fff&bold=true&size=170&name=Imtiaj+A&length=2'; this.alt='Image not found';">
            <div class="admin-badge">
                <i class="fas fa-shield-alt"></i> <span>অ্যাডমিন</span>
            </div>
        </div>

        <!-- নাম এবং প্রতিষ্ঠান -->
        <h1 class="name">ইমতিয়াজ আহমেদ</h1>
        <div class="college-name">
            <i class="fas fa-university" style="margin-right: 6px;"></i> Muladi Govt College
        </div>
        <div class="dept">
            <i class="fas fa-flask"></i> বিজ্ঞান বিভাগ
        </div>

        <!-- যাবতীয় তথ্যসমূহ টাইপিং এনিমেশনসহ -->
        <div class="info-container" id="infoContainer">
            <!-- ডায়নামিকভাবে জাভাস্ক্রিপ্টের মাধ্যমে টাইপিং এফেক্ট আসবে -->
        </div>

        <!-- ফেসবুক যোগাযোগ বাটন -->
        <a href="https://www.facebook.com/imtiaz.ahmed.626198" target="_blank" rel="noopener noreferrer" class="facebook-btn">
            <i class="fab fa-facebook-f"></i> যোগাযোগ করুন (Facebook)
        </a>
        <div class="footer-note">
            <i class="fas fa-globe"></i> Muladi Govt College • অফিসিয়াল অ্যাডমিন প্যানেল
        </div>
    </div>
</div>

<script>
    // প্রোফাইলের তথ্যগুলো (যাবতীয় তথ্য) - "ওয়েব ডেভেলপমেন্ট, ডাটাবেস ম্যানেজমেন্ট ও সাইবার নিরাপত্তায় দক্ষতা" এই লাইনটি বাদ দেওয়া হয়েছে
    const profileDetails = [
        { icon: "fas fa-user-graduate", text: "👤 Imtiaz Ahmed - Website Admin." },
        { icon: "fas fa-chalkboard-user", text: "🎓 Muladi Govt College - Student of the Department of Science." },
        { icon: "fas fa-bullhorn", text: " Responsibilities: Complete website management, content control, group user management." },
        { icon: "fas fa-map-marker-alt", text: " Muladi, Barishal - Bangladesh." },
        { icon: "fab fa-facebook-messenger", text: "📱 সরাসরি যোগাযোগ: কোন প্রকার তথ্য বা সাহায্য প্রজন হইলে ফেসবুক প্রোফাইলে মেসেজ করুন। (বাটনে ক্লিক করুন)" }
    ];

    const container = document.getElementById('infoContainer');
    
    // ফাংশন: প্রতিটি আইটেমের জন্য HTML এলিমেন্ট তৈরি করে টাইপিং এফেক্ট প্রয়োগ
    function createTypingLine(iconClass, fullText, index) {
        const lineDiv = document.createElement('div');
        lineDiv.className = 'info-line';
        // sequential fade-in delay
        lineDiv.style.animationDelay = `${index * 0.25}s`;
        
        // icon span
        const iconSpan = document.createElement('i');
        iconSpan.className = iconClass;
        
        // text container
        const textSpan = document.createElement('span');
        textSpan.className = 'info-text';
        
        lineDiv.appendChild(iconSpan);
        lineDiv.appendChild(textSpan);
        
        let typingStarted = false;
        const startDelay = index * 550; // 0.55 sec gap between each line's typing start
        
        function startTyping() {
            if (typingStarted) return;
            typingStarted = true;
            textSpan.innerHTML = '';
            const cursorSpan = document.createElement('span');
            cursorSpan.className = 'typewriter';
            textSpan.appendChild(cursorSpan);
            
            let i = 0;
            function typeNextChar() {
                if (i < fullText.length) {
                    cursorSpan.innerHTML += fullText.charAt(i);
                    i++;
                    setTimeout(typeNextChar, 35);
                } else {
                    cursorSpan.style.borderRight = 'none';
                    cursorSpan.classList.remove('typewriter');
                }
            }
            typeNextChar();
        }
        
        setTimeout(startTyping, startDelay);
        return lineDiv;
    }
    
    container.innerHTML = '';
    
    profileDetails.forEach((detail, idx) => {
        const lineElem = createTypingLine(detail.icon, detail.text, idx);
        container.appendChild(lineElem);
    });
    
    // পেজের শিরোনাম আরও আকর্ষণীয়
    document.title = "ইমতিয়াজ আহমেদ - Muladi Govt College অ্যাডমিন";
    
    // ছবি লোড না হলে ব্যাকআপ (ইতিমধ্যে onerror আছে)
    const adminImg = document.querySelector('.avatar');
    if (adminImg) {
        adminImg.addEventListener('error', function() {
            if (!this.src.includes('ui-avatars')) {
                this.src = "https://ui-avatars.com/api/?background=1877f2&color=fff&bold=true&size=170&name=Imtiaj+A&length=2";
            }
        });
    }
</script>
</body>
</html>
